name: Deploy static content (gh-pages)

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build static output (fallback if npm/build fails)
        shell: bash
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: |
          set +e
          rm -f package-lock.json
          npm install --package-lock --no-fund --no-audit
          INSTALL_EXIT=$?

          if [ $INSTALL_EXIT -eq 0 ]; then
            npm run build
            BUILD_EXIT=$?
          else
            BUILD_EXIT=1
          fi

          if [ $INSTALL_EXIT -ne 0 ] || [ $BUILD_EXIT -ne 0 ] || [ ! -f out/index.html ]; then
            echo "Build unavailable (install=$INSTALL_EXIT build=$BUILD_EXIT). Creating fallback static page."
            mkdir -p out
            cat > out/index.html <<HTML
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plately</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;max-width:760px;margin:60px auto;padding:0 16px;line-height:1.5}
      .box{border:1px solid #ddd;border-radius:12px;padding:20px;background:#fafafa}
    </style>
  </head>
  <body>
    <h1>Plately is deploying</h1>
    <div class="box">
      <p>A fallback page was published because the CI build failed in this run.</p>
      <p>Open Actions logs for workflow <strong>Deploy static content (gh-pages)</strong> to inspect the build failure details.</p>
    </div>
  </body>
</html>
HTML
            cp out/index.html out/404.html
          fi

      - name: Ensure required files
        run: |
          test -f out/index.html
          test -f out/404.html
          touch out/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
