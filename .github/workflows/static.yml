name: Deploy static content to Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Diagnose environment
        run: |
          node -v
          npm -v
          echo "Resolved base_path: '${{ steps.pages.outputs.base_path }}'"

      - name: Build Next.js export (with fallback page on failure)
        shell: bash
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          set +e
          rm -f package-lock.json
          npm install --package-lock --no-fund --no-audit
          INSTALL_EXIT=$?

          if [ $INSTALL_EXIT -eq 0 ]; then
            npm run build
            BUILD_EXIT=$?
          else
            BUILD_EXIT=1
          fi

          if [ $INSTALL_EXIT -ne 0 ] || [ $BUILD_EXIT -ne 0 ]; then
            echo "Build failed (install=$INSTALL_EXIT build=$BUILD_EXIT). Publishing fallback page so site is active."
            mkdir -p out
            cat > out/index.html <<HTML
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plately deployment in progress</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;max-width:760px;margin:60px auto;padding:0 16px;line-height:1.5}
      .box{border:1px solid #ddd;border-radius:12px;padding:20px;background:#fafafa}
      code{background:#eee;padding:2px 6px;border-radius:6px}
    </style>
  </head>
  <body>
    <h1>Plately deployment is in progress</h1>
    <div class="box">
      <p>The full Next.js export failed in CI, so a fallback page was published to avoid GitHub 404.</p>
      <p>Check GitHub Actions logs for the step <code>Build Next.js export (with fallback page on failure)</code>.</p>
    </div>
  </body>
</html>
HTML
            cp out/index.html out/404.html
          fi

      - name: Verify exported site files
        run: |
          test -f out/index.html
          test -f out/404.html
          ls -la out | sed -n '1,120p'

      - name: Ensure Pages serves static assets
        run: touch out/.nojekyll

      - name: Upload static files as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
